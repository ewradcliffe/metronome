<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Metronome</title>

    <!--link to Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    <!--link to CSS stylesheet-->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <!-- header -->
    <header class="header">
        <div class="container">
            <div class="row">
                <h1 class="d-flex justify-content-center">Metronome</h1>
            </div>
        </div>

    </header>
    <!-- main -->
    <main class="main-body">
        <div class="container">
            <div class="row">
                <div class="col">
                    <div class="row">
                        <div id="tempo-display" class="col-8">
                            <p class="d-flex justify-content-center">120</p>
                        </div>
                        <div class="col-4">
                            <a class="btn d-flex justify-content-center">Start</a>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col">
                            <a class="btn col d-flex justify-content-center">Slower</a>
                        </div>
                        <div class="col">
                            <a class="btn col d-flex justify-content-center">Faster</a>
                        </div>                        
                    </div>
                </div>

            </div>
        </div>
    </main>
    <!-- footer -->
    <footer class="footer fixed-bottom">
        <div class="container">
            <div class="row">
            </div>
        </div>
    </footer>
</body>

</html>
